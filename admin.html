<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>賣家後台 — 檜木精油本舖</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌲</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: var(--cream); }

    /* ── Login page ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, var(--wood-dark) 0%, var(--green-deep) 100%);
      padding: 2rem;
    }
    .login-box {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-logo { font-size: 3.5rem; margin-bottom: 1rem; }
    .login-box h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--wood-dark);
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
    }
    .login-box p { color: var(--ink-mid); font-size: 0.9rem; margin-bottom: 2rem; }
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.85rem 1.5rem;
      background: var(--white);
      border: 2px solid var(--cream-dark);
      border-radius: var(--radius-sm);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .google-btn:hover { border-color: var(--wood-light); box-shadow: 0 4px 16px var(--shadow); }
    .google-icon { font-size: 1.3rem; }
    .login-note { margin-top: 1.5rem; font-size: 0.8rem; color: var(--ink-mid); }

    /* ── Admin layout ── */
    .admin-layout { display: none; min-height: 100vh; }
    .admin-layout.visible { display: flex; }
    .admin-sidebar {
      width: 240px;
      background: var(--wood-dark);
      background-image: linear-gradient(180deg, var(--wood-dark), #1e0f03);
      color: var(--cream);
      padding: 0;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    .sidebar-logo {
      padding: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-family: 'Noto Serif TC', serif;
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--gold-light);
      letter-spacing: 2px;
    }
    .sidebar-nav { flex: 1; padding: 1rem 0; }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.5rem;
      color: rgba(245,237,216,0.75);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }
    .sidebar-nav a:hover,
    .sidebar-nav a.active {
      color: var(--cream);
      background: rgba(255,255,255,0.08);
      border-left-color: var(--gold);
    }
    .sidebar-nav a .ico { font-size: 1.1rem; }
    .sidebar-user {
      padding: 1rem 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .sidebar-user img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--gold); }
    .sidebar-user-info { flex: 1; min-width: 0; }
    .sidebar-user-name { font-size: 0.85rem; font-weight: 600; color: var(--cream); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-user-role { font-size: 0.72rem; color: var(--gold-light); }
    .logout-btn { background: none; border: none; color: rgba(245,237,216,0.55); cursor: pointer; font-size: 1rem; padding: 0.2rem; transition: color 0.2s; }
    .logout-btn:hover { color: var(--red-taiwan); }

    /* ── Admin main ── */
    .admin-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .admin-topbar {
      background: var(--white);
      border-bottom: 1px solid var(--cream-dark);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .admin-topbar h2 {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--wood-dark);
    }
    .admin-content { flex: 1; padding: 2rem; overflow-y: auto; }

    /* ── Panels ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--white);
      border: 1px solid var(--cream-dark);
      border-radius: var(--radius);
      padding: 1.4rem 1.5rem;
      box-shadow: 0 2px 8px var(--shadow);
      border-left: 4px solid var(--gold);
    }
    .stat-card.green { border-left-color: var(--green-mid); }
    .stat-card.red { border-left-color: var(--red-taiwan); }
    .stat-label { font-size: 0.8rem; color: var(--ink-mid); margin-bottom: 0.4rem; font-weight: 600; letter-spacing: 0.5px; }
    .stat-value { font-family: 'Noto Serif TC', serif; font-size: 1.8rem; font-weight: 900; color: var(--wood-dark); }

    /* ── Product table ── */
    .table-wrap { background: var(--white); border-radius: var(--radius); box-shadow: 0 2px 8px var(--shadow); overflow: hidden; }
    .table-toolbar { padding: 1rem 1.5rem; border-bottom: 1px solid var(--cream-dark); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
    .table-toolbar h3 { font-family: 'Noto Serif TC', serif; font-size: 1rem; font-weight: 700; color: var(--wood-dark); }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 0.75rem 1rem;
      background: var(--cream);
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--ink-mid);
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--cream-dark);
    }
    td {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--cream-dark);
      font-size: 0.9rem;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--cream); }
    .product-thumb { width: 44px; height: 44px; border-radius: var(--radius-sm); object-fit: cover; background: var(--cream-dark); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    .toggle-switch { position: relative; width: 44px; height: 24px; display: inline-block; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: var(--cream-dark); border-radius: 12px; cursor: pointer; transition: 0.3s; }
    .slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
    .toggle-switch input:checked + .slider { background: var(--green-mid); }
    .toggle-switch input:checked + .slider::before { transform: translateX(20px); }

    /* ── Product form ── */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .img-upload-area {
      border: 2px dashed var(--cream-dark);
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .img-upload-area:hover { border-color: var(--wood-light); background: var(--cream); }
    .img-preview { max-width: 100%; max-height: 200px; border-radius: var(--radius-sm); margin-top: 1rem; }

    /* ── Orders panel ── */
    .order-row td:first-child { font-family: 'Noto Serif TC', serif; font-size: 0.8rem; color: var(--ink-mid); }
    .status-badge { padding: 0.2rem 0.7rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    .status-paid { background: #d4edda; color: #155724; }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-failed { background: #f8d7da; color: #721c24; }

    /* ── Messages panel ── */
    .msg-thread {
      background: var(--white);
      border: 1px solid var(--cream-dark);
      border-radius: var(--radius);
      margin-bottom: 1rem;
      overflow: hidden;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .msg-thread-header {
      padding: 1rem 1.2rem;
      background: var(--cream);
      border-bottom: 1px solid var(--cream-dark);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }
    .msg-thread-header h4 { font-size: 0.95rem; font-weight: 700; color: var(--wood-dark); }
    .msg-thread-meta { font-size: 0.78rem; color: var(--ink-mid); }
    .msg-thread-body { padding: 1rem 1.2rem; display: none; }
    .msg-thread-body.open { display: block; }
    .msg-bubble {
      margin-bottom: 1rem;
      max-width: 90%;
    }
    .msg-bubble.seller { margin-left: auto; }
    .msg-bubble-inner {
      padding: 0.7rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .msg-bubble .msg-bubble-inner { background: var(--cream); border: 1px solid var(--cream-dark); }
    .msg-bubble.seller .msg-bubble-inner { background: var(--wood-dark); color: var(--cream); }
    .msg-bubble-meta { font-size: 0.73rem; color: var(--ink-mid); margin-top: 0.3rem; }
    .msg-bubble.seller .msg-bubble-meta { text-align: right; }
    .reply-box { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    .reply-box input { flex: 1; }

    @media (max-width: 900px) {
      .admin-sidebar { width: 200px; }
    }
    @media (max-width: 680px) {
      .admin-layout { flex-direction: column; }
      .admin-sidebar { width: 100%; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN PAGE ── -->
<div class="login-page" id="login-page">
  <div class="login-box">
    <div class="login-logo">🌲</div>
    <h1>賣家後台</h1>
    <p>請使用授權的 Google 帳號登入管理系統</p>
    <button class="google-btn" onclick="loginWithGoogle()">
      <span class="google-icon">🔑</span>
      以 Google 帳號登入
    </button>
    <p class="login-note">⚠️ 僅限授權帳號使用，未授權帳號將被拒絕登入</p>
    <div id="login-error" style="color:var(--red-taiwan);margin-top:1rem;font-size:0.88rem;display:none"></div>
  </div>
</div>

<!-- ── ADMIN LAYOUT ── -->
<div class="admin-layout" id="admin-layout">

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="sidebar-logo">🌲 後台管理</div>
    <nav class="sidebar-nav">
      <a href="#" class="active" onclick="switchPanel('dashboard', this)"><span class="ico">📊</span> 總覽</a>
      <a href="#" onclick="switchPanel('products', this)"><span class="ico">📦</span> 商品管理</a>
      <a href="#" onclick="switchPanel('orders', this)"><span class="ico">🧾</span> 訂單管理</a>
      <a href="#" onclick="switchPanel('messages', this)"><span class="ico">💬</span> 客戶留言 <span id="unread-badge" class="badge badge-red" style="margin-left:auto;display:none">0</span></a>
      <hr style="border:none;border-top:1px solid rgba(255,255,255,0.1);margin:0.5rem 0">
      <a href="index.html" target="_blank"><span class="ico">🌐</span> 前往前台</a>
    </nav>
    <div class="sidebar-user">
      <img id="admin-avatar" src="" alt="頭像">
      <div class="sidebar-user-info">
        <div class="sidebar-user-name" id="admin-name">-</div>
        <div class="sidebar-user-role">管理員</div>
      </div>
      <button class="logout-btn" onclick="logout()" title="登出">⏻</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-topbar">
      <h2 id="panel-title">總覽</h2>
      <div style="font-size:0.85rem;color:var(--ink-mid)" id="admin-date"></div>
    </div>

    <div class="admin-content">

      <!-- ── DASHBOARD ── -->
      <div class="panel active" id="panel-dashboard">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">📦 上架商品</div>
            <div class="stat-value" id="stat-products">–</div>
          </div>
          <div class="stat-card green">
            <div class="stat-label">✅ 已付款訂單</div>
            <div class="stat-value" id="stat-paid">–</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">⏳ 待付款訂單</div>
            <div class="stat-value" id="stat-pending">–</div>
          </div>
          <div class="stat-card green">
            <div class="stat-label">💰 本月營收</div>
            <div class="stat-value" id="stat-revenue">–</div>
          </div>
          <div class="stat-card red">
            <div class="stat-label">💬 未讀留言</div>
            <div class="stat-value" id="stat-msg">–</div>
          </div>
        </div>
        <div style="background:var(--white);border-radius:var(--radius);padding:2rem;box-shadow:0 2px 8px var(--shadow);text-align:center">
          <div style="font-size:3rem;margin-bottom:0.5rem">🌲</div>
          <h3 style="font-family:'Noto Serif TC',serif;color:var(--wood-dark);margin-bottom:0.5rem">歡迎回來，管理員！</h3>
          <p style="color:var(--ink-mid);font-size:0.9rem">使用左側選單管理商品、訂單及客戶留言</p>
        </div>
      </div>

      <!-- ── PRODUCTS ── -->
      <div class="panel" id="panel-products">
        <div class="table-wrap" style="margin-bottom:1.5rem">
          <div class="table-toolbar">
            <h3>商品列表</h3>
            <button class="btn btn-gold" onclick="openProductForm()">＋ 新增商品</button>
          </div>
          <div id="products-list">
            <div style="padding:2rem;text-align:center"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

      <!-- ── ORDERS ── -->
      <div class="panel" id="panel-orders">
        <div class="table-wrap">
          <div class="table-toolbar">
            <h3>所有訂單</h3>
            <select class="form-control" style="width:auto" onchange="filterOrders(this.value)" id="order-filter">
              <option value="">全部</option>
              <option value="paid">已付款</option>
              <option value="pending">待付款</option>
              <option value="payment_failed">付款失敗</option>
            </select>
          </div>
          <div style="overflow-x:auto">
            <table>
              <thead>
                <tr>
                  <th>訂單編號</th>
                  <th>購買者</th>
                  <th>金額</th>
                  <th>狀態</th>
                  <th>日期</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="orders-body">
                <tr><td colspan="6" style="text-align:center;padding:2rem"><div class="spinner"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- ── MESSAGES ── -->
      <div class="panel" id="panel-messages">
        <div id="messages-list">
          <div style="text-align:center;padding:2rem"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- ── Product Form Modal ── -->
<div class="modal-overlay" id="product-form-modal">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <h2 id="product-form-title">新增商品</h2>
      <button class="modal-close" onclick="closeModal('product-form-modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="pf-id">
      <div class="form-group">
        <label>商品名稱 *</label>
        <input type="text" class="form-control" id="pf-name" placeholder="例：台灣紅檜精油 10ml">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>售價（NT$）*</label>
          <input type="number" class="form-control" id="pf-price" placeholder="例：580">
        </div>
        <div class="form-group">
          <label>原價（NT$，選填）</label>
          <input type="number" class="form-control" id="pf-orig-price" placeholder="例：680">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>庫存數量</label>
          <input type="number" class="form-control" id="pf-stock" placeholder="例：50（0 = 售完）">
        </div>
        <div class="form-group">
          <label>分類</label>
          <input type="text" class="form-control" id="pf-category" placeholder="例：精油系列">
        </div>
      </div>
      <div class="form-group">
        <label>商品描述</label>
        <textarea class="form-control" id="pf-desc" rows="3" placeholder="商品說明、使用方式…"></textarea>
      </div>
      <div class="form-group">
        <label>商品圖片</label>
        <div class="img-upload-area" onclick="document.getElementById('pf-img-file').click()">
          <div id="img-upload-placeholder">
            <div style="font-size:2.5rem;margin-bottom:0.5rem">📷</div>
            <p style="color:var(--ink-mid);font-size:0.9rem">點擊上傳圖片</p>
            <p style="color:var(--ink-mid);font-size:0.78rem">支援 JPG、PNG（建議 800×800px）</p>
          </div>
          <img id="img-preview" class="img-preview" style="display:none">
        </div>
        <input type="file" id="pf-img-file" accept="image/*" style="display:none" onchange="previewImage(this)">
        <input type="hidden" id="pf-img-url">
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer">
          <label class="toggle-switch">
            <input type="checkbox" id="pf-published" checked>
            <span class="slider"></span>
          </label>
          <span>立即上架</span>
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('product-form-modal')">取消</button>
      <button class="btn btn-gold" onclick="saveProduct()" id="save-product-btn">儲存商品</button>
    </div>
  </div>
</div>

<!-- Order detail modal -->
<div class="modal-overlay" id="order-detail-modal">
  <div class="modal" style="max-width:500px">
    <div class="modal-header">
      <h2>訂單詳情</h2>
      <button class="modal-close" onclick="closeModal('order-detail-modal')">✕</button>
    </div>
    <div class="modal-body" id="order-detail-body"></div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
const ALLOWED_EMAIL = 'enzdwllg@gmail.com';

// ── Auth ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initFirebase();
  document.getElementById('admin-date').textContent = new Date().toLocaleDateString('zh-TW', { year:'numeric',month:'long',day:'numeric',weekday:'long' });

  auth.onAuthStateChanged(user => {
    if (user && user.email === ALLOWED_EMAIL) {
      showAdmin(user);
    } else if (user) {
      // Wrong account
      auth.signOut();
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('login-error').textContent = `❌ 帳號 ${user.email} 無管理權限，請使用授權帳號`;
    } else {
      document.getElementById('login-page').style.display = 'flex';
      document.getElementById('admin-layout').classList.remove('visible');
    }
  });
});

async function loginWithGoogle() {
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ login_hint: ALLOWED_EMAIL });
    await auth.signInWithPopup(provider);
  } catch (err) {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-error').textContent = '登入失敗：' + err.message;
  }
}

function showAdmin(user) {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('admin-layout').classList.add('visible');
  document.getElementById('admin-name').textContent = user.displayName || user.email;
  if (user.photoURL) document.getElementById('admin-avatar').src = user.photoURL;
  loadDashboard();
  loadProducts();
  loadOrders();
  loadMessages();
}

async function logout() {
  await auth.signOut();
  location.reload();
}

// ── Panel switching ───────────────────────────────────
function switchPanel(name, link) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
  link.classList.add('active');
  const titles = { dashboard:'總覽', products:'商品管理', orders:'訂單管理', messages:'客戶留言' };
  document.getElementById('panel-title').textContent = titles[name] || '';
}

// ── Dashboard stats ───────────────────────────────────
async function loadDashboard() {
  try {
    const [prodSnap, ordersSnap, msgSnap] = await Promise.all([
      db.collection('products').where('published','==',true).get(),
      db.collection('orders').get(),
      db.collection('messages').where('hasUnread','==',true).get()
    ]);

    const orders = ordersSnap.docs.map(d => d.data());
    const paid = orders.filter(o => o.status === 'paid');
    const pending = orders.filter(o => o.status === 'pending');
    const now = new Date(); const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const revenue = paid.filter(o => o.createdAt?.toDate() >= monthStart).reduce((s, o) => s + (o.total || 0), 0);

    document.getElementById('stat-products').textContent = prodSnap.size;
    document.getElementById('stat-paid').textContent = paid.length;
    document.getElementById('stat-pending').textContent = pending.length;
    document.getElementById('stat-revenue').textContent = formatPrice(revenue);
    document.getElementById('stat-msg').textContent = msgSnap.size;
    if (msgSnap.size > 0) {
      document.getElementById('unread-badge').textContent = msgSnap.size;
      document.getElementById('unread-badge').style.display = '';
    }
  } catch (e) { console.error(e); }
}

// ── Products ──────────────────────────────────────────
let allProducts = [];

async function loadProducts() {
  try {
    const snap = await db.collection('products').orderBy('createdAt','desc').get();
    allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderProductsList();
  } catch (e) { console.error(e); }
}

function renderProductsList() {
  const container = document.getElementById('products-list');
  if (!allProducts.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📦</div><h3>尚無商品</h3><p>點擊「新增商品」開始上架</p></div>';
    return;
  }
  container.innerHTML = `<div style="overflow-x:auto"><table>
    <thead><tr><th>圖片</th><th>商品名稱</th><th>售價</th><th>庫存</th><th>分類</th><th>上架</th><th>操作</th></tr></thead>
    <tbody>
    ${allProducts.map(p => `
      <tr>
        <td>${p.imageUrl ? `<img class="product-thumb" src="${p.imageUrl}" alt="">` : '<div class="product-thumb">🌲</div>'}</td>
        <td><strong>${p.name}</strong></td>
        <td style="color:var(--red-taiwan);font-weight:700">${formatPrice(p.price)}</td>
        <td>${p.stock ?? '–'}</td>
        <td>${p.category || '–'}</td>
        <td>
          <label class="toggle-switch">
            <input type="checkbox" ${p.published ? 'checked' : ''} onchange="togglePublished('${p.id}', this.checked)">
            <span class="slider"></span>
          </label>
        </td>
        <td style="white-space:nowrap">
          <button class="btn btn-outline btn-sm" onclick='editProduct(${JSON.stringify(p)})'>編輯</button>
          <button class="btn btn-sm" style="background:var(--red-taiwan);color:#fff;border-color:var(--red-taiwan);margin-left:4px" onclick="deleteProduct('${p.id}', '${p.name}')">刪除</button>
        </td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

async function togglePublished(id, val) {
  await db.collection('products').doc(id).update({ published: val });
  const p = allProducts.find(p => p.id === id);
  if (p) p.published = val;
  showToast(val ? '商品已上架' : '商品已下架', 'success');
}

async function deleteProduct(id, name) {
  if (!confirm(`確定要刪除「${name}」嗎？此動作不可復原。`)) return;
  await db.collection('products').doc(id).delete();
  allProducts = allProducts.filter(p => p.id !== id);
  renderProductsList();
  showToast('商品已刪除', 'success');
}

function openProductForm(reset = true) {
  if (reset) {
    document.getElementById('pf-id').value = '';
    document.getElementById('pf-name').value = '';
    document.getElementById('pf-price').value = '';
    document.getElementById('pf-orig-price').value = '';
    document.getElementById('pf-stock').value = '';
    document.getElementById('pf-category').value = '精油系列';
    document.getElementById('pf-desc').value = '';
    document.getElementById('pf-img-url').value = '';
    document.getElementById('img-preview').style.display = 'none';
    document.getElementById('img-upload-placeholder').style.display = 'block';
    document.getElementById('pf-published').checked = true;
    document.getElementById('product-form-title').textContent = '新增商品';
  }
  document.getElementById('product-form-modal').classList.add('open');
}

function editProduct(p) {
  document.getElementById('pf-id').value = p.id;
  document.getElementById('pf-name').value = p.name || '';
  document.getElementById('pf-price').value = p.price || '';
  document.getElementById('pf-orig-price').value = p.originalPrice || '';
  document.getElementById('pf-stock').value = p.stock ?? '';
  document.getElementById('pf-category').value = p.category || '';
  document.getElementById('pf-desc').value = p.description || '';
  document.getElementById('pf-img-url').value = p.imageUrl || '';
  document.getElementById('pf-published').checked = !!p.published;
  document.getElementById('product-form-title').textContent = '編輯商品';
  if (p.imageUrl) {
    document.getElementById('img-preview').src = p.imageUrl;
    document.getElementById('img-preview').style.display = 'block';
    document.getElementById('img-upload-placeholder').style.display = 'none';
  } else {
    document.getElementById('img-preview').style.display = 'none';
    document.getElementById('img-upload-placeholder').style.display = 'block';
  }
  openProductForm(false);
}

function previewImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('img-preview').src = e.target.result;
    document.getElementById('img-preview').style.display = 'block';
    document.getElementById('img-upload-placeholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function saveProduct() {
  const name  = document.getElementById('pf-name').value.trim();
  const price = parseFloat(document.getElementById('pf-price').value);
  if (!name || isNaN(price)) { showToast('請填寫商品名稱和售價', 'error'); return; }

  const btn = document.getElementById('save-product-btn');
  btn.disabled = true; btn.textContent = '儲存中…';

  try {
    let imageUrl = document.getElementById('pf-img-url').value;
    const file = document.getElementById('pf-img-file').files[0];
    if (file) {
      const ref = storage.ref(`products/${Date.now()}_${file.name}`);
      await ref.put(file);
      imageUrl = await ref.getDownloadURL();
    }

    const data = {
      name,
      price,
      originalPrice: parseFloat(document.getElementById('pf-orig-price').value) || null,
      stock: parseInt(document.getElementById('pf-stock').value) ?? null,
      category: document.getElementById('pf-category').value.trim() || '精油系列',
      description: document.getElementById('pf-desc').value.trim(),
      imageUrl,
      published: document.getElementById('pf-published').checked,
    };

    const id = document.getElementById('pf-id').value;
    if (id) {
      await db.collection('products').doc(id).update(data);
      const idx = allProducts.findIndex(p => p.id === id);
      if (idx > -1) allProducts[idx] = { id, ...data };
    } else {
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      const ref = await db.collection('products').add(data);
      allProducts.unshift({ id: ref.id, ...data });
    }

    renderProductsList();
    closeModal('product-form-modal');
    showToast('商品已儲存 ✓', 'success');
  } catch (err) {
    console.error(err);
    showToast('儲存失敗：' + err.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '儲存商品';
  }
}

// ── Orders ────────────────────────────────────────────
let allOrders = [];

async function loadOrders() {
  try {
    const snap = await db.collection('orders').orderBy('createdAt','desc').get();
    allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderOrders('');
  } catch (e) { console.error(e); }
}

function filterOrders(status) { renderOrders(status); }

function renderOrders(statusFilter) {
  const list = statusFilter ? allOrders.filter(o => o.status === statusFilter) : allOrders;
  const statusClass = { paid:'status-paid', pending:'status-pending', payment_failed:'status-failed' };
  const statusLabel = { paid:'已付款', pending:'待付款', payment_failed:'付款失敗' };
  document.getElementById('orders-body').innerHTML = !list.length
    ? '<tr><td colspan="6" class="empty-state" style="text-align:center;padding:2rem">無符合訂單</td></tr>'
    : list.map(o => `<tr class="order-row">
        <td>${o.orderId}</td>
        <td>${o.buyer?.name || '–'}<br><small>${o.buyer?.phone || ''}</small></td>
        <td style="font-weight:700;color:var(--red-taiwan)">${formatPrice(o.total)}</td>
        <td><span class="status-badge ${statusClass[o.status] || ''}">${statusLabel[o.status] || o.status}</span></td>
        <td>${o.createdAt ? formatDate(o.createdAt) : '–'}</td>
        <td><button class="btn btn-outline btn-sm" onclick='viewOrder(${JSON.stringify(o)})'>查看</button></td>
      </tr>`).join('');
}

function viewOrder(o) {
  const statusLabel = { paid:'✅ 已付款', pending:'⏳ 待付款', payment_failed:'❌ 付款失敗' };
  document.getElementById('order-detail-body').innerHTML = `
    <p><strong>訂單編號：</strong>${o.orderId}</p>
    <p><strong>狀態：</strong>${statusLabel[o.status] || o.status}</p>
    <p><strong>金額：</strong><span style="color:var(--red-taiwan);font-weight:700">${formatPrice(o.total)}</span></p>
    <hr style="border:none;border-top:1px solid var(--cream-dark);margin:1rem 0">
    <p><strong>購買者：</strong>${o.buyer?.name}</p>
    <p><strong>電話：</strong>${o.buyer?.phone}</p>
    <p><strong>Email：</strong>${o.buyer?.email || '–'}</p>
    <p><strong>地址：</strong>${o.buyer?.address}</p>
    ${o.buyer?.note ? `<p><strong>備註：</strong>${o.buyer.note}</p>` : ''}
    <hr style="border:none;border-top:1px solid var(--cream-dark);margin:1rem 0">
    <p><strong>商品：</strong></p>
    <ul style="padding-left:1.2rem;margin-top:0.5rem">
      ${(o.items || []).map(i => `<li>${i.name} × ${i.qty} — ${formatPrice(i.price * i.qty)}</li>`).join('')}
    </ul>
    <p style="margin-top:0.5rem"><strong>日期：</strong>${o.createdAt ? formatDate(o.createdAt) : '–'}</p>`;
  document.getElementById('order-detail-modal').classList.add('open');
}

// ── Messages ──────────────────────────────────────────
async function loadMessages() {
  const list = document.getElementById('messages-list');
  try {
    const snap = await db.collection('messages').orderBy('createdAt','desc').get();
    if (snap.empty) {
      list.innerHTML = '<div class="empty-state"><div class="icon">💬</div><h3>尚無客戶留言</h3></div>';
      return;
    }
    list.innerHTML = '';
    for (const doc of snap.docs) {
      const m = { id: doc.id, ...doc.data() };
      list.insertAdjacentHTML('beforeend', renderMsgThread(m));
    }
  } catch (e) { console.error(e); list.innerHTML = '<p style="text-align:center;color:var(--red-taiwan)">載入失敗</p>'; }
}

function renderMsgThread(m) {
  const repliesHtml = (m.replies || []).map(r => `
    <div class="msg-bubble ${r.role === 'seller' ? 'seller' : ''}">
      <div class="msg-bubble-inner">${r.content}</div>
      <div class="msg-bubble-meta">${r.role === 'seller' ? '賣家' : r.name} · ${r.time || ''}</div>
    </div>`).join('');
  return `
  <div class="msg-thread" id="thread-${m.id}">
    <div class="msg-thread-header" onclick="toggleThread('${m.id}')">
      <div>
        <h4>${m.name} <span class="badge badge-wood" style="margin-left:0.5rem">${m.orderQuery || '一般詢問'}</span>
        ${m.hasUnread ? '<span class="badge badge-red" style="margin-left:0.5rem">未讀</span>' : ''}</h4>
        <div class="msg-thread-meta">聯絡：${m.contact} · ${m.createdAt ? formatDate(m.createdAt) : ''}</div>
      </div>
      <span style="color:var(--ink-mid)">▾</span>
    </div>
    <div class="msg-thread-body" id="tbody-${m.id}">
      <div class="msg-bubble">
        <div class="msg-bubble-inner">${m.content}</div>
        <div class="msg-bubble-meta">${m.name} · ${m.createdAt ? formatDate(m.createdAt) : ''}</div>
      </div>
      ${repliesHtml}
      <div class="reply-box">
        <input type="text" class="form-control" id="reply-input-${m.id}" placeholder="輸入回覆…">
        <button class="btn btn-primary btn-sm" onclick="sendSellerReply('${m.id}')">回覆</button>
      </div>
    </div>
  </div>`;
}

async function toggleThread(id) {
  const body = document.getElementById('tbody-' + id);
  body.classList.toggle('open');
  // Mark as read
  try { await db.collection('messages').doc(id).update({ hasUnread: false }); } catch {}
}

async function sendSellerReply(id) {
  const inp = document.getElementById('reply-input-' + id);
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  const reply = {
    role: 'seller', content: text,
    time: new Date().toLocaleString('zh-TW'),
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  };
  await db.collection('messages').doc(id).update({
    replies: firebase.firestore.FieldValue.arrayUnion(reply)
  });
  showToast('回覆已送出 ✓', 'success');
  loadMessages();
}

// ── Modal helpers ─────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.modal-overlay').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
  });
});
</script>
</body>
</html>
